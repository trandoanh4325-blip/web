<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập Admin</title>
    <link rel="stylesheet" href="../css/styleLogin.css">
</head>
<body>
<!-- Trang trí nền -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Vùng chứa form đăng nhập -->
    <div class="login-wrapper">
        <header class="logo-container">
            <!-- Nếu không tìm thấy ảnh, sẽ hiển thị div fallback phía dưới (đã xử lý trong JS) -->
            <img src="../Image/logostore-Photoroom.png" alt="Logo" id="storeLogo" onerror="handleImageError(this)">
            <div class="logo-fallback" id="logoFallback" style="display: none;">ADMIN PANEL</div>
        </header>

        <h2>Đăng nhập Hệ thống</h2>
        
        <form id="adminLoginForm">
            <div class="input-group">
                <label for="email">Email quản trị</label>
                <input type="text" id="email" placeholder="Nhập email..." autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu..." autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">Đăng nhập</button>
        </form>
    </div>

    <!-- Khu vực chứa Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>
  <script src="../js/scriptLogin.js"></script>
</body>
</html>
